apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: flexilearn-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: Never # <--- Utilise l'image locale de Minikube sans Internet
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "admin" # En vraie prod, on utiliserait un Secret K8s
        - name: POSTGRES_DB
          value: "flexilearn"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc